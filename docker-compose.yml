# Compose file for the hourly MPC optimizer.
#
# Combined deployment (this stack + docker-compose.forecasting.yml) is
# documented in docs/deploy.md — invoke both compose files from the same
# working directory; the relative bind mounts (./data/...) depend on it.
#
# What runs:
#     init-state    one-shot, seeds data/state/current.json on first deploy.
#                   Idempotent: noop if state already exists.
#     optimization  long-running daemon. Polls data/forecast/ every
#                   SCAN_INTERVAL_S seconds and triggers one MPC cycle for
#                   the newest unseen <solve_time>.parquet file. Polling
#                   (rather than inotify) is intentional: identical behavior
#                   on Linux and macOS, one mechanism, no platform quirks.
#
# Filename format is YYYY-MM-DDTHH-MM-SSZ.parquet — hyphens (not colons)
# in the time portion so the names are valid on Windows filesystems and
# match the daemon's scanner regex (see src/optimization/daemon.py).
#
# Data layout (bind-mounted under ./data):
#     data/forecast/   <solve_time>.parquet            (input)
#     data/state/      current.json + dated history    (persistent)
#     data/dispatch/   <solve_time>.parquet            (output)
#     data/config/     plant_config.json (optional)    (input, read-only)
#
# Plant config (multi-asset):
#     With CONFIG_FILE unset, both services run on PlantConfig.legacy_default()
#     (1 HP + 1 boiler + 1 CHP + 1 storage). To deploy a custom plant:
#         1. drop plant_config.json into ./data/config/
#         2. set CONFIG_FILE=/shared/config/plant_config.json (e.g. in .env)
#         3. docker compose up -d --build
#     The path must match between init-state (seeds matching state) and the
#     daemon (every cycle); using the same env var here guarantees that.

x-optimization-image: &optimization-image
  build:
    context: .
    dockerfile: Dockerfile
  image: optimization-mpc:latest

services:
  init-state:
    <<: *optimization-image
    container_name: optimization-init-state
    restart: "no"
    # Shell-form command so we can conditionally pass --config-file and
    # --solve-time only when the corresponding env is set. Without the
    # conditional, an empty value would be passed as --flag "" and
    # init-state would error out.
    #
    # INIT_STATE_SOLVE_TIME is the seed timestamp embedded in current.json
    # — it becomes the daemon's monotonicity floor (minus commit_hours).
    # Default (unset) = init-state uses pd.Timestamp.now(tz='UTC').floor('h'),
    # which is correct for a live-feed producer but rejects every replay
    # forecast as already-processed. For the CSV replay setup, set
    # INIT_STATE_SOLVE_TIME to a timestamp older than csv_end - 3 months
    # (e.g. 2025-12-01T00:00:00Z) in your .env before first `up`. Unset
    # at live-feed cutover. See docs/deploy.md §"Replay vs. live-feed
    # timestamps".
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        python -m optimization.init_state \
          --state-out /shared/state/current.json \
          $${CONFIG_FILE:+--config-file "$$CONFIG_FILE"} \
          $${INIT_STATE_SOLVE_TIME:+--solve-time "$$INIT_STATE_SOLVE_TIME"}
    environment:
      CONFIG_FILE: ${CONFIG_FILE:-}
      INIT_STATE_SOLVE_TIME: ${INIT_STATE_SOLVE_TIME:-}
    volumes:
      - ./data/state:/shared/state
      - ./data/config:/shared/config:ro
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "2"

  optimization:
    <<: *optimization-image
    container_name: optimization-mpc
    restart: unless-stopped
    depends_on:
      init-state:
        condition: service_completed_successfully
    environment:
      TZ: Etc/UTC
      FORECAST_DIR: /shared/forecast
      STATE_DIR: /shared/state
      DISPATCH_DIR: /shared/dispatch
      # Empty = PlantConfig.legacy_default(); set to a path inside the
      # container (e.g. /shared/config/plant_config.json) to deploy multi-asset.
      # Parameter-only edits to this file are picked up at the next cycle
      # boundary without a restart; adding/removing assets still requires
      # stopping the daemon, re-seeding state, and restarting.
      CONFIG_FILE: ${CONFIG_FILE:-}
      PRICES_SOURCE: ${PRICES_SOURCE:-live}
      RESOLUTION: ${RESOLUTION:-quarterhour}
      FORECAST_RESOLUTION: ${FORECAST_RESOLUTION:-hour}
      SCAN_INTERVAL_S: ${SCAN_INTERVAL_S:-2}
      # Opt-in stale-floor (hours). 0 = disabled, required while the
      # CSV replay producer is in use (it writes months-old solve_times).
      # Set to a positive int at live-feed cutover.
      STALE_GRACE_HOURS: ${STALE_GRACE_HOURS:-0}
    volumes:
      - ./data/forecast:/shared/forecast:ro
      - ./data/state:/shared/state
      - ./data/dispatch:/shared/dispatch
      - ./data/config:/shared/config:ro
    # Cap memory so a runaway solve cannot drag the host down. pyomo +
    # HiGHS on a 140-slot horizon comfortably fits in a few hundred MB;
    # 2 GB is generous headroom for pathological MILPs without exposing
    # the host.
    mem_limit: 2g
    mem_reservation: 512m
    healthcheck:
      # Heartbeat is seeded during init-state and then bumped by the daemon
      # after every successful cycle. 5400s = 90 min: well past the hourly
      # cadence, with margin for one late forecast.
      test: ["CMD-SHELL", "test -f /shared/state/.heartbeat && test $(($(date +%s) - $(stat -c %Y /shared/state/.heartbeat))) -lt 5400"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 15m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
