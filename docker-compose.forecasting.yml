# Compose file for the hourly forecasting replay container.
#
# Deliberately kept as a separate stack from docker-compose.yml so the two
# components can be deployed, restarted, and rebuilt independently. They
# communicate purely through the shared data/forecast/ bind mount — same
# filesystem-as-contract pattern the optimization daemon already uses.
#
# Combined deployment (this stack + docker-compose.yml) is documented in
# docs/deploy.md — invoke both compose files from the same working
# directory; the relative bind mounts (./data/...) depend on it.
#
# What runs:
#     forecasting-init  one-shot. Ensures /shared/forecast exists and is
#                       owned by uid 1001 before the long-running container
#                       starts. Mirrors the init-state pattern in
#                       docker-compose.yml; idempotent.
#     forecasting       long-running replay loop. Loads
#                       data/demand_history/raw_data_measured_demand.csv once at
#                       startup (CSV is held in memory for the lifetime of
#                       the process; restart the container to pick up a
#                       changed CSV), then every TICK_INTERVAL_S seconds
#                       advances a virtual solve_time through the last
#                       REPLAY_LOOKBACK_MONTHS of the CSV and writes the
#                       resulting parquet into /shared/forecast/. When the
#                       virtual clock reaches csv_end the loop idles (no
#                       wrap — the daemon's monotonicity check would skip
#                       wrapped solve_times).
#
# Data layout (bind-mounted under ./data):
#     data/demand_history/  raw_data_measured_demand.csv  (input, read-only)
#     data/forecast/         <solve_time>.parquet          (output → daemon)

services:
  forecasting-init:
    # Tiny root-only oneshot that fixes ownership on the bind-mounted
    # forecast dir. Rootful Docker creates a missing bind-mount target as
    # root:root mode 0755; without this step the forecasting container
    # (uid 1001) cannot write into a freshly-created data/forecast/ on a
    # clean host. The deploy doc still recommends pre-chowning, but this
    # turns "must remember step 2" into belt-and-suspenders.
    image: busybox:1.36
    container_name: forecasting-init
    restart: "no"
    user: "0:0"
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /shared/forecast \
        && chown 1001:1001 /shared/forecast
    # No -R on chown: the running container only needs ownership of the
    # directory (it creates new files inside). Recursive would clobber the
    # ownership of any files the operator dropped in by hand for inspection.
    volumes:
      - ./data/forecast:/shared/forecast
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "2"

  forecasting:
    build:
      context: .
      dockerfile: Dockerfile.forecasting
    image: forecasting-replay:latest
    container_name: forecasting-replay
    restart: unless-stopped
    depends_on:
      forecasting-init:
        condition: service_completed_successfully
    environment:
      TZ: Etc/UTC
      CSV_PATH: /shared/demand_history/raw_data_measured_demand.csv
      FORECAST_DIR: /shared/forecast
      MODEL: ${MODEL:-combined_seasonal}
      HORIZON_HOURS: ${HORIZON_HOURS:-35}
      REPLAY_LOOKBACK_MONTHS: ${REPLAY_LOOKBACK_MONTHS:-3}
      # 3600 = real hourly cadence (matches the optimization scan). Drop to
      # a small value (e.g. 5) for demos that need many cycles per minute.
      TICK_INTERVAL_S: ${TICK_INTERVAL_S:-3600}
    volumes:
      - ./data/demand_history:/shared/demand_history:ro
      - ./data/forecast:/shared/forecast
    # Cap memory: CSV + cleaned history + a baseline model fit well under
    # 200 MB. 1 GB is comfortable headroom and protects the host if a
    # future model balloons unexpectedly.
    mem_limit: 1g
    mem_reservation: 256m
    healthcheck:
      # Heartbeat is seeded at container start and bumped after every
      # successful tick. 5400s = 90 min: well past the hourly cadence with
      # margin for one slow cycle.
      test: ["CMD-SHELL", "test -f /shared/forecast/.heartbeat && test $(($(date +%s) - $(stat -c %Y /shared/forecast/.heartbeat))) -lt 5400"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 2m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
